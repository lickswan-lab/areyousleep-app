<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate Chuangqian Icons</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }
  h1 { color: #f0e6d3; margin-bottom: 0.5rem; }
  .icon-row {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    justify-content: center;
  }
  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    background: #0d1117;
    border-radius: 12px;
    padding: 1.5rem;
  }
  canvas { border-radius: 8px; }
  a.download {
    display: inline-block;
    padding: 0.5rem 1.2rem;
    background: #f0e6d3;
    color: #070b14;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.85rem;
  }
  a.download:hover { background: #e6d4b8; }
  .label { font-size: 0.8rem; opacity: 0.7; }
  #status { margin-top: 1rem; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>床前 Icon Generator</h1>
<p>Click each button to download the icon file.</p>

<div class="icon-row" id="icons"></div>
<div id="status"></div>

<script>
const CONFIGS = [
  { name: 'icon-192.png',          size: 192, maskable: false },
  { name: 'icon-512.png',          size: 512, maskable: false },
  { name: 'icon-maskable-192.png', size: 192, maskable: true  },
  { name: 'icon-maskable-512.png', size: 512, maskable: true  },
];

function drawIcon(canvas, size, maskable) {
  const ctx = canvas.getContext('2d');
  canvas.width = size;
  canvas.height = size;

  const cx = size / 2;
  const cy = size / 2;

  // Background - full circle (or full square for maskable)
  ctx.fillStyle = '#070b14';
  if (maskable) {
    ctx.fillRect(0, 0, size, size);
  } else {
    ctx.beginPath();
    ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // For maskable, content lives within 80% safe zone
  const scale = maskable ? 0.65 : 0.85;
  const r = (size / 2) * scale;

  // Moon glow - soft radial gradient
  const glowRadius = r * 1.3;
  const glow = ctx.createRadialGradient(
    cx - r * 0.15, cy - r * 0.1, r * 0.2,
    cx - r * 0.15, cy - r * 0.1, glowRadius
  );
  glow.addColorStop(0, 'rgba(240, 230, 211, 0.12)');
  glow.addColorStop(0.5, 'rgba(240, 230, 211, 0.04)');
  glow.addColorStop(1, 'rgba(240, 230, 211, 0)');

  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, glowRadius, 0, Math.PI * 2);
  ctx.fill();

  // Crescent moon - draw full circle then subtract with another circle
  // Main moon circle
  const moonR = r * 0.52;
  const moonCx = cx - r * 0.05;
  const moonCy = cy - r * 0.02;

  // Use compositing to create crescent
  ctx.save();

  // Draw full moon
  ctx.beginPath();
  ctx.arc(moonCx, moonCy, moonR, 0, Math.PI * 2);

  // Subtract circle (shifted to the upper-right to create crescent)
  const cutR = moonR * 0.82;
  const cutOffsetX = moonR * 0.55;
  const cutOffsetY = -moonR * 0.25;

  // Create crescent using even-odd rule
  ctx.arc(moonCx + cutOffsetX, moonCy + cutOffsetY, cutR, 0, Math.PI * 2, true);
  ctx.closePath();

  // Moon color with subtle gradient
  const moonGrad = ctx.createLinearGradient(
    moonCx - moonR, moonCy - moonR,
    moonCx + moonR, moonCy + moonR
  );
  moonGrad.addColorStop(0, '#f5ede0');
  moonGrad.addColorStop(0.5, '#f0e6d3');
  moonGrad.addColorStop(1, '#e8dcc6');

  ctx.fillStyle = moonGrad;
  ctx.fill('evenodd');

  // Warm inner glow on the crescent
  const innerGlow = ctx.createRadialGradient(
    moonCx - moonR * 0.2, moonCy, moonR * 0.3,
    moonCx, moonCy, moonR
  );
  innerGlow.addColorStop(0, 'rgba(255, 245, 225, 0.15)');
  innerGlow.addColorStop(1, 'rgba(255, 245, 225, 0)');

  ctx.beginPath();
  ctx.arc(moonCx, moonCy, moonR, 0, Math.PI * 2);
  ctx.arc(moonCx + cutOffsetX, moonCy + cutOffsetY, cutR, 0, Math.PI * 2, true);
  ctx.closePath();
  ctx.fillStyle = innerGlow;
  ctx.fill('evenodd');

  ctx.restore();

  // Small stars - tiny dots for ambiance
  const stars = [
    { x: 0.30, y: 0.25, s: 0.012, o: 0.6 },
    { x: 0.72, y: 0.32, s: 0.008, o: 0.4 },
    { x: 0.65, y: 0.68, s: 0.010, o: 0.5 },
    { x: 0.25, y: 0.72, s: 0.007, o: 0.35 },
    { x: 0.78, y: 0.55, s: 0.006, o: 0.3 },
  ];

  stars.forEach(star => {
    const sx = cx + (star.x - 0.5) * size * scale;
    const sy = cy + (star.y - 0.5) * size * scale;
    const sr = size * star.s;

    // Star glow
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr * 3);
    sg.addColorStop(0, `rgba(240, 230, 211, ${star.o * 0.5})`);
    sg.addColorStop(1, 'rgba(240, 230, 211, 0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(sx, sy, sr * 3, 0, Math.PI * 2);
    ctx.fill();

    // Star dot
    ctx.fillStyle = `rgba(240, 230, 211, ${star.o})`;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  });
}

function createIconCard(config) {
  const container = document.getElementById('icons');
  const card = document.createElement('div');
  card.className = 'icon-card';

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = `${config.name} (${config.size}x${config.size}${config.maskable ? ', maskable' : ''})`;

  const canvas = document.createElement('canvas');
  const displaySize = Math.min(config.size, 256);
  canvas.style.width = displaySize + 'px';
  canvas.style.height = displaySize + 'px';

  drawIcon(canvas, config.size, config.maskable);

  const link = document.createElement('a');
  link.className = 'download';
  link.textContent = 'Download ' + config.name;
  link.download = config.name;
  link.href = canvas.toDataURL('image/png');

  card.appendChild(label);
  card.appendChild(canvas);
  card.appendChild(link);
  container.appendChild(card);
}

// Generate all icons
CONFIGS.forEach(createIconCard);

document.getElementById('status').textContent = 'All icons rendered. Click each button to download.';
</script>
</body>
</html>
